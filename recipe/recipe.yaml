context:
  version: 0.17.0
package:
  name: alacritty-graphics
  version: ${{ version }}
source:
  url: https://github.com/ayosec/alacritty/archive/refs/tags/v${{ version }}-graphics.tar.gz
  sha256: 6a0da03b29e33f392009c109666680fd04340f9e25309e7e6fcd10f5e82f370a
build:
  number: 1
requirements:
  build:
  - ${{ compiler('rust') }}
  - ${{ stdlib('c') }}
  - cargo-bundle-licenses
  - cargo-auditable
  - pkg-config
  host:
  - if: linux
    then:
    - fontconfig >=2.14,<2.15
    - expat
    - libxcb
    - libxkbcommon
tests:
- script:
  - alacritty --version
about:
  homepage: https://alacritty.org/
  repository: https://github.com/ayosec/alacritty
  documentation: https://alacritty.org/
  license: Apache-2.0 OR MIT
  license_file:
  - LICENSE-MIT
  - LICENSE-APACHE
  - THIRDPARTY.yml
  description: A cross-platform, OpenGL terminal emulator.
  summary: A cross-platform, OpenGL terminal emulator.
extra:
  recipe-maintainers:
  - VasanthakumarV
